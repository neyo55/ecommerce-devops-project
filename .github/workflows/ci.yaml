name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Catalog Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-service:latest ./apps/catalog-service
          docker push ${{ secrets.DOCKER_USERNAME }}/catalog-service:latest

      - name: Build and Push Frontend UI
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-ui:latest ./apps/frontend-ui
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-ui:latest