name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'infrastructure/k8s-manifests/**'

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Create a global environment variable for the 7-character image tag
      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- CATALOG SERVICE ---
      - name: Build Catalog Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-service:${{ env.SHORT_SHA }} ./apps/catalog-service

      - name: Scan Catalog Service (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/catalog-service:${{ env.SHORT_SHA }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Catalog Service & Update Manifest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/catalog-service:${{ env.SHORT_SHA }}
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/catalog-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/catalog-service:${{ env.SHORT_SHA }}|g" infrastructure/k8s-manifests/catalog-api.yaml

      # --- FRONTEND UI ---
      - name: Build Frontend UI
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-ui:${{ env.SHORT_SHA }} ./apps/frontend-ui
          
      - name: Scan Frontend UI (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/frontend-ui:${{ env.SHORT_SHA }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend UI & Update Manifest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-ui:${{ env.SHORT_SHA }}
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/frontend-ui:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend-ui:${{ env.SHORT_SHA }}|g" infrastructure/k8s-manifests/frontend-deployment.yaml

      # --- CART SERVICE ---
      - name: Build Cart Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cart-service:${{ env.SHORT_SHA }} ./apps/cart-service

      - name: Scan Cart Service (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/cart-service:${{ env.SHORT_SHA }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Cart Service & Update Manifest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cart-service:${{ env.SHORT_SHA }}
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/cart-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/cart-service:${{ env.SHORT_SHA }}|g" infrastructure/k8s-manifests/cart-api.yaml

      # --- AUTH SERVICE ---
      - name: Build Auth Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ env.SHORT_SHA }} ./apps/auth-service

      - name: Scan Auth Service (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/auth-service:${{ env.SHORT_SHA }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Auth Service & Update Manifest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ env.SHORT_SHA }}
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/auth-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ env.SHORT_SHA }}|g" infrastructure/k8s-manifests/auth-api.yaml

      # --- ORDER SERVICE ---
      - name: Build Order Service
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.SHORT_SHA }} ./apps/order-service

      - name: Scan Order Service (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.SHORT_SHA }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Order Service & Update Manifest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.SHORT_SHA }}
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/order-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.SHORT_SHA }}|g" infrastructure/k8s-manifests/order-api.yaml
      
      # --- GITOPS SYNC ---
      - name: Commit and Push GitOps Manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/k8s-manifests/
          git commit -m "ci: auto-update image tags to ${{ env.SHORT_SHA }} [skip ci]" || echo "No changes to commit"
          git push origin main