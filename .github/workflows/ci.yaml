name: CI Pipeline

on:
  push:
    branches:
      - main
    # This prevents an infinite loop when the bot pushes the YAML updates
    paths-ignore:
      - 'infrastructure/k8s-manifests/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Catalog Service
        run: |
          # Use the short GitHub SHA as the unique image tag
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalog-service:$IMAGE_TAG ./apps/catalog-service
          docker push ${{ secrets.DOCKER_USERNAME }}/catalog-service:$IMAGE_TAG
          
          # Use sed to find and replace the image tag in the YAML file
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/catalog-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/catalog-service:$IMAGE_TAG|g" infrastructure/k8s-manifests/catalog-api.yaml

      - name: Build and Push Frontend UI
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-ui:$IMAGE_TAG ./apps/frontend-ui
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-ui:$IMAGE_TAG
          
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/frontend-ui:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend-ui:$IMAGE_TAG|g" infrastructure/k8s-manifests/frontend-ui.yaml

      - name: Commit and Push GitOps Manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/k8s-manifests/
          # The [skip ci] tag tells GitHub not to run this pipeline again for this specific commit
          git commit -m "ci: auto-update image tags to ${GITHUB_SHA::7} [skip ci]" || echo "No changes to commit"
          git push origin main