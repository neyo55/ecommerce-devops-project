apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-deployment
  labels:
    app: catalog
spec:
  replicas: 2 # Let's run 2 copies of the backend for high availability testing
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: catalog-service:1.0
        imagePullPolicy: Never 
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  type: ClusterIP # ClusterIP means it is only accessible from INSIDE the cluster
  selector:
    app: catalog
  ports:
  - port: 3001
    targetPort: 3001